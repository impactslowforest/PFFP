name: Deploy PFFP to VPS

on:
  push:
    branches: [master]
    paths:
      - 'pocketbase/pb_public/**'
      - 'pocketbase/pb_hooks/**'
      - 'pocketbase/pb_migrations/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy frontend to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "pocketbase/pb_public/*"
          target: "/var/www/pffp/"
          strip_components: 2

      - name: Deploy backend hooks to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "pocketbase/pb_hooks/*"
          target: "/opt/pffp/"
          strip_components: 1

      - name: Restart PocketBase to reload hooks
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            # Restart PocketBase to pick up hook changes
            systemctl restart pffp

            # Verify
            sleep 3
            systemctl is-active pffp && echo "✓ PFFP service is running" || echo "✗ PFFP service failed!"
            curl -sf http://127.0.0.1:8095/api/health && echo "✓ PFFP API is healthy!" || echo "✗ PFFP health check failed!"
